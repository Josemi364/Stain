<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quantBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6020A0"/>
      <stop offset="100%" stop-color="#1A0840"/>
    </linearGradient>
    <radialGradient id="quantGlow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#AA40FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#AA40FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="64" cy="121" rx="50" ry="4" fill="#AA40FF" opacity="0.4"/>
  <!-- Cuerpo principal con bordes biselados -->
  <path d="M 18 8 L 110 8 L 118 16 L 118 112 L 110 120 L 18 120 L 10 112 L 10 16 Z" fill="url(#quantBody)"/>
  <!-- Borde con glow violeta -->
  <path d="M 18 8 L 110 8 L 118 16 L 118 112 L 110 120 L 18 120 L 10 112 L 10 16 Z" fill="none" stroke="#AA40FF" stroke-width="1.5" opacity="0.7"/>
  <!-- Glow interior -->
  <path d="M 18 8 L 110 8 L 118 16 L 118 112 L 110 120 L 18 120 L 10 112 L 10 16 Z" fill="url(#quantGlow)"/>
  <!-- Panel de control superior con runas -->
  <rect x="14" y="12" width="100" height="22" rx="2" fill="#0A0420"/>
  <rect x="14" y="12" width="100" height="22" rx="2" fill="none" stroke="#AA40FF" stroke-width="0.8"/>
  <!-- Display con símbolos cósmicos -->
  <rect x="20" y="16" width="34" height="14" rx="1" fill="#000000"/>
  <text x="37" y="26" font-family="monospace" font-size="9" fill="#AA40FF" text-anchor="middle">∞:∞∞</text>
  <!-- Runas decorativas -->
  <text x="64" y="26" font-family="serif" font-size="10" fill="#CC60FF" text-anchor="middle">⟁</text>
  <text x="78" y="26" font-family="serif" font-size="10" fill="#CC60FF" text-anchor="middle">⟐</text>
  <text x="92" y="26" font-family="serif" font-size="10" fill="#CC60FF" text-anchor="middle">◈</text>
  <text x="106" y="26" font-family="serif" font-size="10" fill="#CC60FF" text-anchor="middle">⧖</text>
  <!-- Hueco circular del tambor (negro absoluto con halo) -->
  <circle cx="64" cy="74" r="42" fill="#AA40FF" opacity="0.25"/>
  <circle cx="64" cy="74" r="38" fill="#000000"/>
  <circle cx="64" cy="74" r="38" fill="none" stroke="#AA40FF" stroke-width="1.5"/>
  <circle cx="64" cy="74" r="40" fill="none" stroke="#AA40FF" stroke-width="0.6" opacity="0.6"/>
  <!-- Estrellas pequeñas alrededor -->
  <circle cx="22" cy="50" r="0.8" fill="#FFFFFF"/>
  <circle cx="106" cy="60" r="0.8" fill="#FFFFFF"/>
  <circle cx="20" cy="90" r="0.6" fill="#FFFFFF"/>
  <circle cx="108" cy="100" r="1" fill="#FFFFFF"/>
  <circle cx="64" cy="120" r="0.6" fill="#CC60FF"/>
  <!-- Inscripción inferior -->
  <text x="64" y="118" font-family="serif" font-size="6" fill="#AA40FF" text-anchor="middle" font-style="italic">QUANTUM ∞ STAIN</text>
  <!-- Brillo del cristal -->
  <path d="M 22 38 L 22 110 L 28 100 L 28 50 Z" fill="#FFFFFF" opacity="0.1"/>
</svg>
