<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#041828"/>
      <stop offset="25%"  stop-color="#0C2E44"/>
      <stop offset="50%"  stop-color="#123850"/>
      <stop offset="75%"  stop-color="#0C2E44"/>
      <stop offset="100%" stop-color="#02121E"/>
    </linearGradient>
    <radialGradient id="ojo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E8FF"/>
      <stop offset="50%"  stop-color="#0080AA"/>
      <stop offset="100%" stop-color="#002040" stop-opacity="0.2"/>
    </radialGradient>
  </defs>

  <!-- Sombra -->
  <path d="M 14,50 L 242,50 L 242,140 L 192,140 L 192,248 L 64,248 L 64,140 L 14,140 Z"
        fill="#000818" opacity="0.45" transform="translate(3,5)"/>

  <!-- Cuerpo del manto (T muy ancha, larga, dramática) -->
  <path d="M 14,50 L 242,50 L 242,140 L 192,140 L 192,248 L 64,248 L 64,140 L 14,140 Z"
        fill="url(#mg)"/>

  <!-- Capucha (puntiaguda, mística) -->
  <polygon points="128,8 100,50 156,50" fill="#041628"/>
  <ellipse cx="128" cy="54" rx="22" ry="14" fill="#010C18" opacity="0.9"/>

  <!-- Ojos brillantes en la capucha -->
  <ellipse cx="120" cy="52" rx="6"   ry="4"   fill="url(#ojo)"/>
  <ellipse cx="136" cy="52" rx="6"   ry="4"   fill="url(#ojo)"/>
  <circle  cx="120" cy="52" r="2"    fill="#FFFFFF" opacity="0.9"/>
  <circle  cx="136" cy="52" r="2"    fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="120" cy="52" rx="2.5" ry="1.8" fill="#001828"/>
  <ellipse cx="136" cy="52" rx="2.5" ry="1.8" fill="#001828"/>

  <!-- Sombras laterales del cuerpo -->
  <rect x="64"  y="140" width="14" height="108" fill="#000000" opacity="0.22"/>
  <rect x="178" y="140" width="14" height="108" fill="#000000" opacity="0.22"/>
  <!-- Sombras inferiores de mangas -->
  <rect x="14"  y="122" width="78" height="18" fill="#000000" opacity="0.2"/>
  <rect x="164" y="122" width="78" height="18" fill="#000000" opacity="0.2"/>

  <!-- Broche de pecho (gema cyan) -->
  <circle cx="128" cy="110" r="10"  fill="#001E30" stroke="#00CCFF" stroke-width="1.8"/>
  <circle cx="128" cy="110" r="6"   fill="url(#ojo)"/>
  <circle cx="128" cy="110" r="2.5" fill="#FFFFFF" opacity="0.95"/>

  <!-- Motivos de OJO repartidos por el manto -->
  <!-- Ojo izquierdo grande -->
  <ellipse cx="84"  cy="168" rx="18" ry="10" fill="#041828" stroke="#00CCFF" stroke-width="1.2" opacity="0.8"/>
  <circle  cx="84"  cy="168" r="5"   fill="url(#ojo)" opacity="0.85"/>
  <circle  cx="84"  cy="168" r="2"   fill="#FFFFFF"   opacity="0.95"/>
  <!-- Ojo derecho grande -->
  <ellipse cx="172" cy="168" rx="18" ry="10" fill="#041828" stroke="#00CCFF" stroke-width="1.2" opacity="0.8"/>
  <circle  cx="172" cy="168" r="5"   fill="url(#ojo)" opacity="0.85"/>
  <circle  cx="172" cy="168" r="2"   fill="#FFFFFF"   opacity="0.95"/>
  <!-- Ojo central (más grande, más prominente) -->
  <ellipse cx="128" cy="200" rx="22" ry="12" fill="#041828" stroke="#00CCFF" stroke-width="1.8" opacity="0.9"/>
  <circle  cx="128" cy="200" r="7"   fill="url(#ojo)" opacity="0.9"/>
  <circle  cx="128" cy="200" r="2.8" fill="#FFFFFF"   opacity="0.95"/>
  <!-- Ojos pequeños adicionales -->
  <ellipse cx="46"  cy="195" rx="12" ry="7"  fill="#041828" stroke="#00AACC" stroke-width="0.9" opacity="0.6"/>
  <circle  cx="46"  cy="195" r="3.5" fill="url(#ojo)" opacity="0.65"/>
  <circle  cx="46"  cy="195" r="1.5" fill="#FFFFFF" opacity="0.85"/>
  <ellipse cx="210" cy="195" rx="12" ry="7"  fill="#041828" stroke="#00AACC" stroke-width="0.9" opacity="0.6"/>
  <circle  cx="210" cy="195" r="3.5" fill="url(#ojo)" opacity="0.65"/>
  <circle  cx="210" cy="195" r="1.5" fill="#FFFFFF" opacity="0.85"/>

  <!-- Pliegues luminosos verticales -->
  <line x1="36"  y1="58"  x2="28"  y2="246" stroke="#00CCFF" stroke-width="1.2" opacity="0.28"/>
  <line x1="90"  y1="58"  x2="82"  y2="246" stroke="#00AACC" stroke-width="0.8" opacity="0.22"/>
  <line x1="128" y1="60"  x2="128" y2="246" stroke="#00CCFF" stroke-width="0.7" opacity="0.18"/>
  <line x1="166" y1="58"  x2="174" y2="246" stroke="#00AACC" stroke-width="0.8" opacity="0.22"/>
  <line x1="220" y1="58"  x2="228" y2="246" stroke="#00CCFF" stroke-width="1.2" opacity="0.28"/>

  <!-- Ribetes de puños (cyan) -->
  <rect x="14"  y="134" width="78" height="6" fill="#00CCFF" opacity="0.45"/>
  <rect x="164" y="134" width="78" height="6" fill="#00CCFF" opacity="0.45"/>

  <!-- Ribete inferior (glow cyan) -->
  <rect x="64" y="243" width="128" height="5" fill="#00CCFF" opacity="0.4"/>

  <!-- Brillo central -->
  <rect x="118" y="56" width="20" height="190" fill="#FFFFFF" opacity="0.05"/>
</svg>
