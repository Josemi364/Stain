    <linearGradient id="satin" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#8E2848" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3A0A1E" stop-opacity="0"/>
