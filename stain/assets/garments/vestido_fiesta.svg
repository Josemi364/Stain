<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg_bod" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2E0618"/>
      <stop offset="30%"  stop-color="#501426"/>
      <stop offset="55%"  stop-color="#5E1A30"/>
      <stop offset="80%"  stop-color="#501426"/>
      <stop offset="100%" stop-color="#260410"/>
    </linearGradient>
    <linearGradient id="dg_skirt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#28040E"/>
      <stop offset="20%"  stop-color="#4A1022"/>
      <stop offset="50%"  stop-color="#721A38"/>
      <stop offset="80%"  stop-color="#4A1022"/>
      <stop offset="100%" stop-color="#200208"/>
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <path d="M 100,32 L 96,96 L 28,244 L 228,244 L 160,96 L 156,32 Z"
        fill="#000" opacity="0.22" transform="translate(3,5)"/>

  <!-- Falda acampanada (A-line) — parte más grande -->
  <path d="M 96,96 L 28,244 L 228,244 L 160,96 Z" fill="url(#dg_skirt)"/>

  <!-- Corpiño entallado (parte superior) -->
  <path d="M 100,32 L 96,96 L 160,96 L 156,32 Z" fill="url(#dg_bod)"/>

  <!-- Sombras laterales falda (dan volumen y profundidad) -->
  <path d="M 96,96 L 28,244 L 58,244 L 108,96 Z"  fill="#000" opacity="0.2"/>
  <path d="M 160,96 L 228,244 L 198,244 L 148,96 Z" fill="#000" opacity="0.2"/>

  <!-- Sombra lateral corpiño -->
  <rect x="100" y="32" width="10" height="64" fill="#000" opacity="0.12"/>
  <rect x="146" y="32" width="10" height="64" fill="#000" opacity="0.12"/>

  <!-- Escote recto con ligera curva (strapless look) -->
  <path d="M 100,32 Q 128,28 156,32" stroke="#26041A" stroke-width="1.5" fill="none"/>

  <!-- Tirantes finos -->
  <line x1="104" y1="22" x2="102" y2="36" stroke="#26041A" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="152" y1="22" x2="154" y2="36" stroke="#26041A" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Cinturilla que separa corpiño y falda -->
  <rect x="94" y="94" width="68" height="6" fill="#1A0210"/>

  <!-- Pliegues verticales de la falda (físicamente correctos, van desde cintura) -->
  <line x1="112" y1="100" x2="74"  y2="242" stroke="#5A1428" stroke-width="1.2" opacity="0.6"/>
  <line x1="128" y1="100" x2="128" y2="242" stroke="#4A1020" stroke-width="0.9" opacity="0.5"/>
  <line x1="144" y1="100" x2="182" y2="242" stroke="#5A1428" stroke-width="1.2" opacity="0.6"/>
  <line x1="120" y1="100" x2="96"  y2="242" stroke="#4A1020" stroke-width="0.7" opacity="0.4"/>
  <line x1="136" y1="100" x2="160" y2="242" stroke="#4A1020" stroke-width="0.7" opacity="0.4"/>

  <!-- Adornos en la cintura (pedrería) -->
  <circle cx="128" cy="97" r="2.8" fill="#F0AAC0" opacity="0.9"/>
  <circle cx="117" cy="96" r="1.8" fill="#F0AAC0" opacity="0.6"/>
  <circle cx="139" cy="96" r="1.8" fill="#F0AAC0" opacity="0.6"/>
  <circle cx="108" cy="94" r="1.2" fill="#F0AAC0" opacity="0.4"/>
  <circle cx="148" cy="94" r="1.2" fill="#F0AAC0" opacity="0.4"/>

  <!-- Brillo satinado del corpiño -->
  <rect x="106" y="34" width="12" height="60" fill="#FFF" opacity="0.1"/>

  <!-- Brillo satinado de la falda -->
  <path d="M 112,100 L 84,242 L 96,242 L 122,100 Z" fill="#FFF" opacity="0.06"/>

  <!-- Ribete inferior -->
  <rect x="28" y="239" width="200" height="5" fill="#26040E"/>
</svg>
