<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3A0A1E"/>
      <stop offset="25%"  stop-color="#5C1830"/>
      <stop offset="50%"  stop-color="#6A2038"/>
      <stop offset="75%"  stop-color="#5C1830"/>
      <stop offset="100%" stop-color="#340816"/>
    </linearGradient>
    <linearGradient id="dg_b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2E0618"/>
      <stop offset="30%"  stop-color="#4E1228"/>
      <stop offset="50%"  stop-color="#5A1830"/>
      <stop offset="70%"  stop-color="#4E1228"/>
      <stop offset="100%" stop-color="#280412"/>
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <path d="M 96,38 L 160,38 L 160,96 L 226,240 L 30,240 L 96,96 Z"
        fill="#000000" opacity="0.2" transform="translate(3,5)"/>

  <!-- Falda (triángulo A-line) -->
  <path d="M 96,96 L 30,240 L 226,240 L 160,96 Z" fill="url(#dg)"/>

  <!-- Corpiño (parte superior) -->
  <rect x="96" y="38" width="64" height="58" fill="url(#dg_b)"/>

  <!-- Sombras laterales del corpiño -->
  <rect x="96"  y="38" width="10" height="58" fill="#000000" opacity="0.15"/>
  <rect x="150" y="38" width="10" height="58" fill="#000000" opacity="0.15"/>

  <!-- Sombras laterales de la falda -->
  <path d="M 96,96 L 30,240 L 56,240 L 108,96 Z"  fill="#000000" opacity="0.18"/>
  <path d="M 160,96 L 226,240 L 200,240 L 148,96 Z" fill="#000000" opacity="0.18"/>

  <!-- Tirantes finos -->
  <rect x="104" y="30" width="5" height="14" fill="#2E0618"/>
  <rect x="147" y="30" width="5" height="14" fill="#2E0618"/>

  <!-- Escote (borde superior del corpiño) -->
  <rect x="96" y="38" width="64" height="4" fill="#2E0618"/>

  <!-- Cinturilla (separación corpiño/falda) -->
  <rect x="94" y="93" width="68" height="6" fill="#2A0614"/>

  <!-- Pliegues verticales de la falda -->
  <line x1="110" y1="100" x2="72"  y2="238" stroke="#4A1020" stroke-width="1.2" opacity="0.7"/>
  <line x1="128" y1="100" x2="128" y2="238" stroke="#4A1020" stroke-width="1"   opacity="0.6"/>
  <line x1="146" y1="100" x2="184" y2="238" stroke="#4A1020" stroke-width="1.2" opacity="0.7"/>
  <line x1="120" y1="100" x2="96"  y2="238" stroke="#4A1020" stroke-width="0.7" opacity="0.5"/>
  <line x1="136" y1="100" x2="160" y2="238" stroke="#4A1020" stroke-width="0.7" opacity="0.5"/>

  <!-- Detalles decorativos en el escote -->
  <circle cx="128" cy="93" r="2.5" fill="#E8A0B0" opacity="0.9"/>
  <circle cx="118" cy="92" r="1.5" fill="#E8A0B0" opacity="0.6"/>
  <circle cx="138" cy="92" r="1.5" fill="#E8A0B0" opacity="0.6"/>

  <!-- Brillo central de la falda (satén) -->
  <path d="M 118,100 L 100,238 L 108,238 L 126,100 Z" fill="#FFFFFF" opacity="0.08"/>

  <!-- Ribete inferior -->
  <rect x="30" y="235" width="196" height="5" fill="#2A0614"/>

  <!-- Brillo corpiño -->
  <rect x="104" y="40" width="12" height="54" fill="#FFFFFF" opacity="0.1"/>
</svg>
