<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#08080E"/>
      <stop offset="25%"  stop-color="#121218"/>
      <stop offset="50%"  stop-color="#181820"/>
      <stop offset="75%"  stop-color="#121218"/>
      <stop offset="100%" stop-color="#06060C"/>
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <path d="M 26,50 L 230,50 L 230,110 L 180,110 L 180,238 L 76,238 L 76,110 L 26,110 Z"
        fill="#000000" opacity="0.28" transform="translate(3,4)"/>

  <!-- Chaqueta del uniforme (T-shape) -->
  <path d="M 26,50 L 230,50 L 230,110 L 180,110 L 180,238 L 76,238 L 76,110 L 26,110 Z"
        fill="url(#ug)"/>

  <!-- Camisa interior muy oscura -->
  <polygon points="128,50 104,50 114,92 128,108 142,92 152,50" fill="#161616"/>

  <!-- Solapa izquierda (militar, angulosa) -->
  <polygon points="128,50 94,50 80,110 128,140" fill="#060610"/>
  <!-- Solapa derecha -->
  <polygon points="128,50 162,50 176,110 128,140" fill="#060610"/>
  <!-- Bordes ROJOS en las solapas (símbolo de rango) -->
  <line x1="94"  y1="50"  x2="80"  y2="110" stroke="#880000" stroke-width="2"/>
  <line x1="162" y1="50"  x2="176" y2="110" stroke="#880000" stroke-width="2"/>
  <line x1="80"  y1="110" x2="128" y2="140" stroke="#440000" stroke-width="1"/>
  <line x1="176" y1="110" x2="128" y2="140" stroke="#440000" stroke-width="1"/>

  <!-- Corbata negra con ribete rojo -->
  <polygon points="122,92 134,92 138,106 133,120 138,145 132,175 124,175 118,145 123,120 118,106" fill="#0A0008"/>
  <polygon points="122,92 134,92 138,106 118,106" fill="#040004"/>
  <line x1="128" y1="92" x2="128" y2="175" stroke="#550000" stroke-width="0.8" opacity="0.6"/>

  <!-- Sombras laterales del cuerpo -->
  <rect x="76"  y="110" width="12" height="128" fill="#000000" opacity="0.28"/>
  <rect x="168" y="110" width="12" height="128" fill="#000000" opacity="0.28"/>
  <!-- Sombras inferiores mangas -->
  <rect x="26"  y="96"  width="50" height="14" fill="#000000" opacity="0.22"/>
  <rect x="180" y="96"  width="50" height="14" fill="#000000" opacity="0.22"/>

  <!-- Insignia del Agente (estrella de 6 puntas) -->
  <circle cx="152" cy="124" r="13"  fill="#090912" stroke="#880000" stroke-width="1.5"/>
  <circle cx="152" cy="124" r="9"   fill="#060610" stroke="#CC0000" stroke-width="0.8"/>
  <polygon points="152,116 154.5,122 161,122 155.8,126 157.5,132 152,128 146.5,132 148.2,126 143,122 149.5,122"
           fill="#CC0000" opacity="0.9"/>
  <circle cx="152" cy="124" r="2.5" fill="#FF8080" opacity="0.85"/>

  <!-- Banda roja de hombro (galón de rango) -->
  <rect x="26"  y="88" width="50" height="6" fill="#8B0000"/>
  <rect x="180" y="88" width="50" height="6" fill="#8B0000"/>
  <rect x="26"  y="84" width="50" height="4" fill="#3A0000"/>
  <rect x="180" y="84" width="50" height="4" fill="#3A0000"/>

  <!-- Botones oscuros con núcleo rojo -->
  <circle cx="128" cy="165" r="3.5" fill="#050510"/>
  <circle cx="128" cy="165" r="2"   fill="#1A0008"/>
  <circle cx="128" cy="192" r="3.5" fill="#050510"/>
  <circle cx="128" cy="192" r="2"   fill="#1A0008"/>
  <circle cx="128" cy="219" r="3.5" fill="#050510"/>
  <circle cx="128" cy="219" r="2"   fill="#1A0008"/>

  <!-- Cierre central -->
  <line x1="128" y1="140" x2="128" y2="236" stroke="#0E0E18" stroke-width="1.5"/>

  <!-- Bolsillo izquierdo del pecho con tapa y botón -->
  <rect x="84"  y="122" width="28" height="32" rx="1" fill="none" stroke="#0C0C16" stroke-width="1.2"/>
  <rect x="84"  y="122" width="28" height="7"  rx="1" fill="#0C0C16"/>
  <circle cx="98" cy="125" r="2" fill="#1A0008"/>

  <!-- Detalle en el cuello (ribete rojo) -->
  <line x1="116" y1="88" x2="140" y2="88" stroke="#660000" stroke-width="1.2"/>

  <!-- Costuras de las mangas -->
  <line x1="26"  y1="110" x2="76"  y2="110" stroke="#0E0E18" stroke-width="1.2"/>
  <line x1="180" y1="110" x2="230" y2="110" stroke="#0E0E18" stroke-width="1.2"/>

  <!-- Ribetes de puños (rojo oscuro) -->
  <rect x="26"  y="104" width="50" height="6" fill="#3A0000"/>
  <rect x="180" y="104" width="50" height="6" fill="#3A0000"/>

  <!-- Ribete inferior (rojo muy oscuro) -->
  <rect x="76" y="232" width="104" height="6" fill="#1A0000"/>

  <!-- Brillo muy sutil (rojo siniestro) -->
  <rect x="86" y="112" width="10" height="124" fill="#3A0000" opacity="0.08"/>
</svg>
