<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38220E"/>
      <stop offset="22%"  stop-color="#5A3A20"/>
      <stop offset="50%"  stop-color="#6A4628"/>
      <stop offset="78%"  stop-color="#5A3A20"/>
      <stop offset="100%" stop-color="#321C0A"/>
    </linearGradient>
    <pattern id="wool" patternUnits="userSpaceOnUse" width="5" height="5">
      <circle cx="2.5" cy="2.5" r="0.7" fill="#7A5230" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Sombra -->
  <path d="M 18,50 L 238,50 L 238,130 L 182,130 L 182,245 L 74,245 L 74,130 L 18,130 Z"
        fill="#000000" opacity="0.2" transform="translate(3,4)"/>

  <!-- Cuerpo del abrigo (T muy ancha y larga) -->
  <path d="M 18,50 L 238,50 L 238,130 L 182,130 L 182,245 L 74,245 L 74,130 L 18,130 Z"
        fill="url(#wg)"/>

  <!-- Textura de lana encima -->
  <path d="M 18,50 L 238,50 L 238,130 L 182,130 L 182,245 L 74,245 L 74,130 L 18,130 Z"
        fill="url(#wool)" opacity="0.9"/>

  <!-- Sombras laterales del cuerpo -->
  <rect x="74"  y="130" width="14" height="115" fill="#000000" opacity="0.18"/>
  <rect x="168" y="130" width="14" height="115" fill="#000000" opacity="0.18"/>
  <!-- Sombras inferiores mangas -->
  <rect x="18"  y="114" width="56" height="16" fill="#000000" opacity="0.16"/>
  <rect x="182" y="114" width="56" height="16" fill="#000000" opacity="0.16"/>

  <!-- Solapas del abrigo (izquierda) -->
  <polygon points="128,50 82,50 82,130 128,155" fill="#2A1608"/>
  <!-- Solapas (derecha) -->
  <polygon points="128,50 174,50 174,130 128,155" fill="#2A1608"/>
  <!-- Borde interior de solapas -->
  <line x1="82"  y1="50"  x2="82"  y2="130" stroke="#1A0C04" stroke-width="1"/>
  <line x1="174" y1="50"  x2="174" y2="130" stroke="#1A0C04" stroke-width="1"/>
  <line x1="82"  y1="130" x2="128" y2="155" stroke="#1A0C04" stroke-width="1"/>
  <line x1="174" y1="130" x2="128" y2="155" stroke="#1A0C04" stroke-width="1"/>

  <!-- Cuello visible entre solapas -->
  <polygon points="112,50 128,50 128,60" fill="#3A2010"/>
  <polygon points="144,50 128,50 128,60" fill="#3A2010"/>

  <!-- Cinturón -->
  <rect x="74" y="162" width="108" height="11" fill="#1E0E04"/>
  <rect x="74" y="162" width="108" height="3"  fill="#4A2E14"/>
  <!-- Hebilla -->
  <rect x="120" y="160" width="16" height="15" rx="1" fill="#8A6840"/>
  <rect x="122" y="162" width="12" height="11" rx="1" fill="none" stroke="#4A2E14" stroke-width="1.2"/>

  <!-- Botones -->
  <circle cx="98" cy="148" r="6"   fill="#1A0A04"/>
  <circle cx="98" cy="148" r="4.2" fill="#3A2010"/>
  <circle cx="98" cy="185" r="6"   fill="#1A0A04"/>
  <circle cx="98" cy="185" r="4.2" fill="#3A2010"/>
  <circle cx="98" cy="220" r="6"   fill="#1A0A04"/>
  <circle cx="98" cy="220" r="4.2" fill="#3A2010"/>

  <!-- Cierre central -->
  <line x1="128" y1="155" x2="128" y2="244" stroke="#1A0A04" stroke-width="1.5"/>

  <!-- Costuras de las mangas -->
  <line x1="18"  y1="130" x2="74"  y2="130" stroke="#38220E" stroke-width="1.2"/>
  <line x1="182" y1="130" x2="238" y2="130" stroke="#38220E" stroke-width="1.2"/>

  <!-- Ribetes de puños -->
  <rect x="18"  y="124" width="56" height="6" fill="#2A1608"/>
  <rect x="182" y="124" width="56" height="6" fill="#2A1608"/>

  <!-- Ribete inferior -->
  <rect x="74" y="239" width="108" height="6" fill="#2A1608"/>

  <!-- Brillo central -->
  <rect x="118" y="155" width="20" height="89" fill="#FFFFFF" opacity="0.05"/>
</svg>
