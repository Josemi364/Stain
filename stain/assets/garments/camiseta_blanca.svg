<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8C8C8"/>
      <stop offset="28%"  stop-color="#E8E8E8"/>
      <stop offset="50%"  stop-color="#F2F2F2"/>
      <stop offset="72%"  stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#C4C4C4"/>
    </linearGradient>
  </defs>

  <!-- Sombra (mismo path desplazado) -->
  <path d="M 26,50 L 108,50 A 20,22 0 0 1 148,50 L 230,50 L 230,110 L 180,110 L 180,235 L 76,235 L 76,110 L 26,110 Z"
        fill="#000000" opacity="0.15" transform="translate(3,4)"/>

  <!-- Cuerpo principal en forma de T -->
  <path d="M 26,50 L 108,50 A 20,22 0 0 1 148,50 L 230,50 L 230,110 L 180,110 L 180,235 L 76,235 L 76,110 L 26,110 Z"
        fill="url(#tg)"/>

  <!-- Ribete del cuello (banda más oscura alrededor de la abertura) -->
  <path d="M 104,50 A 24,26 0 0 1 152,50 L 148,50 A 20,22 0 0 0 108,50 Z"
        fill="#D0D0D0"/>
  <!-- Línea interior del cuello -->
  <path d="M 108,50 A 20,22 0 0 1 148,50" stroke="#C0C0C0" stroke-width="1" fill="none"/>

  <!-- Sombra lateral izquierda del cuerpo -->
  <rect x="76" y="110" width="12" height="125" fill="#000000" opacity="0.07"/>
  <!-- Sombra lateral derecha del cuerpo -->
  <rect x="168" y="110" width="12" height="125" fill="#000000" opacity="0.07"/>
  <!-- Sombra inferior de la manga izquierda (donde se une al cuerpo) -->
  <rect x="26" y="96" width="50" height="14" fill="#000000" opacity="0.07"/>
  <!-- Sombra inferior de la manga derecha -->
  <rect x="180" y="96" width="50" height="14" fill="#000000" opacity="0.07"/>

  <!-- Costuras de las mangas (horizontal donde se unen al cuerpo) -->
  <line x1="76" y1="110" x2="26" y2="110" stroke="#C8C8C8" stroke-width="1.2"/>
  <line x1="180" y1="110" x2="230" y2="110" stroke="#C8C8C8" stroke-width="1.2"/>

  <!-- Costura lateral del cuerpo (muy sutil) -->
  <line x1="76" y1="110" x2="76" y2="235" stroke="#D4D4D4" stroke-width="0.6"/>
  <line x1="180" y1="110" x2="180" y2="235" stroke="#D4D4D4" stroke-width="0.6"/>

  <!-- Pliegues horizontales del tejido -->
  <line x1="84"  y1="148" x2="172" y2="148" stroke="#D8D8D8" stroke-width="0.8" opacity="0.7"/>
  <line x1="82"  y1="188" x2="174" y2="188" stroke="#D8D8D8" stroke-width="0.8" opacity="0.6"/>

  <!-- Ribete inferior (hem) -->
  <rect x="76" y="230" width="104" height="5" fill="#D8D8D8"/>

  <!-- Ribetes de los puños -->
  <rect x="26" y="105" width="50" height="5" fill="#D8D8D8"/>
  <rect x="180" y="105" width="50" height="5" fill="#D8D8D8"/>

  <!-- Brillo central sutil -->
  <rect x="114" y="50" width="28" height="185" fill="#FFFFFF" opacity="0.12"/>
</svg>
