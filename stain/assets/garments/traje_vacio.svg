<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#04041C"/>
      <stop offset="25%"  stop-color="#0A0A28"/>
      <stop offset="50%"  stop-color="#0E0E32"/>
      <stop offset="75%"  stop-color="#0A0A28"/>
      <stop offset="100%" stop-color="#02021A"/>
    </linearGradient>
    <radialGradient id="visor" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#4090FF" stop-opacity="0.9"/>
      <stop offset="45%"  stop-color="#0040AA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000820" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- Sombra del cuerpo -->
  <path d="M 26,100 L 230,100 L 230,138 L 184,138 L 184,242 L 72,242 L 72,138 L 26,138 Z"
        fill="#000000" opacity="0.3" transform="translate(3,4)"/>

  <!-- Cuerpo del traje (T-shape) -->
  <path d="M 26,100 L 230,100 L 230,138 L 184,138 L 184,242 L 72,242 L 72,138 L 26,138 Z"
        fill="url(#vg)"/>

  <!-- Casco esférico centrado arriba -->
  <circle cx="128" cy="56" r="44" fill="#101030"/>
  <circle cx="128" cy="56" r="44" fill="none" stroke="#2A2A50" stroke-width="2.5"/>
  <!-- Visor -->
  <ellipse cx="128" cy="56" rx="32" ry="27" fill="url(#visor)"/>
  <!-- Reflejos del visor -->
  <ellipse cx="115" cy="45" rx="12" ry="7" fill="#5090FF" opacity="0.4"/>
  <ellipse cx="111" cy="41" rx="5"  ry="3" fill="#90C0FF" opacity="0.6"/>
  <circle  cx="116" cy="43" r="2.5" fill="#FFFFFF" opacity="0.55"/>

  <!-- Cuello de conexión -->
  <rect x="112" y="96"  width="32" height="12" rx="3" fill="#141432"/>
  <rect x="114" y="97"  width="28" height="5"  rx="2" fill="#2A2A50"/>

  <!-- Sombras laterales del cuerpo del traje -->
  <rect x="72"  y="138" width="14" height="104" fill="#000000" opacity="0.28"/>
  <rect x="170" y="138" width="14" height="104" fill="#000000" opacity="0.28"/>
  <!-- Sombras inferiores de mangas -->
  <rect x="26"  y="122" width="58" height="16" fill="#000000" opacity="0.2"/>
  <rect x="172" y="122" width="58" height="16" fill="#000000" opacity="0.2"/>

  <!-- Panel de control en el pecho -->
  <rect x="96"  y="152" width="64" height="48" rx="3" fill="#080820" stroke="#2A2A50" stroke-width="1.2"/>
  <!-- Pantalla -->
  <rect x="98"  y="154" width="60" height="26" rx="1" fill="#000C22"/>
  <!-- Barras de progreso -->
  <rect x="100" y="158" width="56" height="4" rx="1" fill="#001840"/>
  <rect x="100" y="158" width="40" height="4" rx="1" fill="#00AAFF"/>
  <rect x="100" y="165" width="56" height="4" rx="1" fill="#001840"/>
  <rect x="100" y="165" width="18" height="4" rx="1" fill="#0060FF"/>
  <!-- Botones indicadores -->
  <circle cx="108" cy="188" r="3" fill="#00FF60"/>
  <circle cx="120" cy="188" r="3" fill="#FFAA00"/>
  <circle cx="132" cy="188" r="3" fill="#FF2040"/>
  <circle cx="144" cy="188" r="3" fill="#4060FF"/>

  <!-- Insignia central inferior -->
  <circle cx="128" cy="218" r="10"  fill="#080820" stroke="#2060FF" stroke-width="1"/>
  <circle cx="128" cy="218" r="6"   fill="none"    stroke="#1040A0" stroke-width="0.8"/>
  <polygon points="128,212 131,220 128,218 125,220" fill="#2060FF"/>

  <!-- Ribetes de puños (azules) -->
  <rect x="26"  y="132" width="58" height="6" fill="#2060FF" opacity="0.6"/>
  <rect x="172" y="132" width="58" height="6" fill="#2060FF" opacity="0.6"/>

  <!-- Ribete inferior (azul glow) -->
  <rect x="72"  y="237" width="112" height="5" fill="#2060FF" opacity="0.5"/>

  <!-- Articulaciones de rodilla -->
  <rect x="70"  y="195" width="8" height="5" rx="1" fill="#1E1E3A"/>
  <rect x="178" y="195" width="8" height="5" rx="1" fill="#1E1E3A"/>

  <!-- Brillo central del traje -->
  <rect x="118" y="104" width="20" height="136" fill="#FFFFFF" opacity="0.04"/>
</svg>
