<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tg" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#6A2A9A"/>
      <stop offset="45%"  stop-color="#3A1268"/>
      <stop offset="100%" stop-color="#160838"/>
    </radialGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#240C4A"/>
      <stop offset="30%"  stop-color="#4E1A80"/>
      <stop offset="55%"  stop-color="#5E2490"/>
      <stop offset="80%"  stop-color="#4E1A80"/>
      <stop offset="100%" stop-color="#200840"/>
    </linearGradient>
    <linearGradient id="glow_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#CC60FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#CC60FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CC60FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <path d="M78,46 C60,46 38,60 26,80 L16,104 C14,120 18,148 22,168 C28,192 30,220 28,244 L228,244 C226,220 228,192 234,168 C238,148 242,120 240,104 L230,80 C218,60 196,46 178,46 L152,38 Q128,62 104,38 Z"
        fill="#0A0020" opacity="0.4" transform="translate(3,6)"/>

  <!-- Cuerpo fluido de la túnica (muy amplio en la base) -->
  <path d="M78,46 C60,46 38,60 26,80 L16,104 C14,120 18,148 22,168 C28,192 30,220 28,244 L228,244 C226,220 228,192 234,168 C238,148 242,120 240,104 L230,80 C218,60 196,46 178,46 L152,38 Q128,62 104,38 Z"
        fill="url(#tg2)"/>

  <!-- Capucha -->
