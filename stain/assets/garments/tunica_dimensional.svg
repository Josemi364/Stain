<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#20084A"/>
      <stop offset="25%"  stop-color="#3E1478"/>
      <stop offset="50%"  stop-color="#4E1E8E"/>
      <stop offset="75%"  stop-color="#3E1478"/>
      <stop offset="100%" stop-color="#180640"/>
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <path d="M 26,50 L 230,50 L 230,130 L 192,130 L 192,245 L 64,245 L 64,130 L 26,130 Z"
        fill="#0A0020" opacity="0.4" transform="translate(3,5)"/>

  <!-- Cuerpo de la túnica (T-shape muy ancha, larga) -->
  <path d="M 26,50 L 230,50 L 230,130 L 192,130 L 192,245 L 64,245 L 64,130 L 26,130 Z"
        fill="url(#tg)"/>

  <!-- Capucha puntiaguda centrada -->
  <polygon points="128,8 106,50 150,50" fill="#18064A"/>
  <ellipse cx="128" cy="52" rx="18" ry="11" fill="#0A0028" opacity="0.85"/>

  <!-- Sombras laterales del cuerpo -->
  <rect x="64"  y="130" width="14" height="115" fill="#000000" opacity="0.22"/>
  <rect x="178" y="130" width="14" height="115" fill="#000000" opacity="0.22"/>
  <!-- Sombras inferiores de mangas -->
  <rect x="26"  y="114" width="66" height="16" fill="#000000" opacity="0.2"/>
  <rect x="164" y="114" width="66" height="16" fill="#000000" opacity="0.2"/>

  <!-- Símbolo místico central: círculos + triángulos entrelazados -->
  <circle cx="128" cy="170" r="30"  fill="none" stroke="#AA40FF" stroke-width="1.5" opacity="0.85"/>
  <circle cx="128" cy="170" r="20"  fill="none" stroke="#CC60FF" stroke-width="1"   opacity="0.7"/>
  <circle cx="128" cy="170" r="5"   fill="#DD88FF" opacity="0.8"/>
  <polygon points="128,144 146,176 110,176" fill="none" stroke="#AA40FF" stroke-width="1.2" opacity="0.8"/>
  <polygon points="128,196 110,164 146,164" fill="none" stroke="#CC60FF" stroke-width="1"   opacity="0.7"/>

  <!-- Pliegues luminosos verticales del cuerpo -->
  <line x1="82"  y1="60"  x2="70"  y2="244" stroke="#AA40FF" stroke-width="1"   opacity="0.4"/>
  <line x1="108" y1="60"  x2="102" y2="244" stroke="#AA40FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="148" y1="60"  x2="154" y2="244" stroke="#AA40FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="174" y1="60"  x2="186" y2="244" stroke="#AA40FF" stroke-width="1"   opacity="0.4"/>

  <!-- Partículas/estrellas -->
  <circle cx="56"  cy="160" r="1.5" fill="#EE88FF" opacity="0.9"/>
  <circle cx="96"  cy="200" r="1.2" fill="#FFFFFF"  opacity="0.8"/>
  <circle cx="162" cy="190" r="1.5" fill="#EE88FF"  opacity="0.9"/>
  <circle cx="200" cy="165" r="1.2" fill="#FFFFFF"  opacity="0.8"/>
  <circle cx="74"  cy="215" r="1"   fill="#CC80FF"  opacity="0.7"/>
  <circle cx="182" cy="218" r="1"   fill="#CC80FF"  opacity="0.7"/>

  <!-- Borde inferior con glow sutil -->
  <rect x="64" y="240" width="128" height="5" fill="#AA40FF" opacity="0.4"/>

  <!-- Ribetes de puños -->
  <rect x="26"  y="124" width="66" height="6" fill="#AA40FF" opacity="0.5"/>
  <rect x="164" y="124" width="66" height="6" fill="#AA40FF" opacity="0.5"/>

  <!-- Brillo central -->
  <rect x="118" y="52" width="20" height="192" fill="#FFFFFF" opacity="0.06"/>
</svg>
