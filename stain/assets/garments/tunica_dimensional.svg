  <circle cx="128" cy="130" r="22"  fill="none" stroke="#CC60FF" stroke-width="0.8" opacity="0.6"/>
  <circle cx="128" cy="130" r="5"   fill="#EE88FF" opacity="0.7"/>
  <!-- Triángulo hacia arriba -->
  <path d="M128,102 L148,136 L108,136 Z" fill="none" stroke="#AA40FF" stroke-width="1" opacity="0.7"/>
  <!-- Triángulo hacia abajo -->
  <path d="M128,158 L108,124 L148,124 Z" fill="none" stroke="#CC60FF" stroke-width="1" opacity="0.7"/>
  <!-- Puntos en las intersecciones -->
  <circle cx="128" cy="102" r="2" fill="#FFAAFF" opacity="0.9"/>
  <circle cx="148" cy="136" r="2" fill="#FFAAFF" opacity="0.9"/>
  <circle cx="108" cy="136" r="2" fill="#FFAAFF" opacity="0.9"/>

  <!-- Pliegues luminosos verticales -->
  <path d="M44,84 C38,140 34,195 36,244"  stroke="#AA40FF" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M84,68 C80,130 78,195 80,244"  stroke="#AA40FF" stroke-width="1"   fill="none" opacity="0.3"/>
  <path d="M128,62 L128,244"              stroke="#CC60FF" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M172,68 C176,130 178,195 176,244" stroke="#AA40FF" stroke-width="1"   fill="none" opacity="0.3"/>
  <path d="M212,84 C218,140 222,195 220,244" stroke="#AA40FF" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Borde inferior con glow -->
  <path d="M28,244 L228,244" stroke="url(#glow_edge)" stroke-width="2.5" fill="none"/>
  <!-- Estrellas/partículas flotantes -->
  <circle cx="58"  cy="168" r="1.2" fill="#EE88FF" opacity="0.9"/>
  <circle cx="96"  cy="200" r="1"   fill="#FFFFFF"  opacity="0.8"/>
  <circle cx="162" cy="185" r="1.2" fill="#EE88FF"  opacity="0.9"/>
  <circle cx="198" cy="172" r="1"   fill="#FFFFFF"  opacity="0.8"/>
  <circle cx="76"  cy="220" r="0.8" fill="#CC80FF"  opacity="0.7"/>
  <circle cx="180" cy="225" r="0.8" fill="#CC80FF"  opacity="0.7"/>
  <circle cx="120" cy="215" r="1"   fill="#FFFFFF"  opacity="0.7"/>
  <circle cx="140" cy="224" r="0.8" fill="#EE88FF"  opacity="0.7"/>

  <!-- Brillo central -->
  <path d="M116,44 C114,130 114,200 116,244 L124,244 C122,200 122,130 124,44 Z" fill="#FFFFFF" opacity="0.07"/>
